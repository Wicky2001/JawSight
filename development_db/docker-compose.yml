services:
  db:
    image: postgres:16
    container_name: jawsight_dev_db
    restart: always

    ports:
      - "5432:5432"

    environment:
      POSTGRES_USER: ${ROOT_USER}
      POSTGRES_PASSWORD: ${ROOT_PASSWORD}
      POSTGRES_DB: ${ROOT_DB}

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql   

volumes:
  pgdata:
    name: jawsight_dev_db_volume